<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAYADITYA | Future of Luxury Aviation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --gold: #efc07b;
            --navy-deep: #0a0e1a;
            --navy-light: #1a1a2e;
        }

        body {
            background-color: var(--navy-deep);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

       .font-luxury { font-family: 'Cinzel', serif; }
        
       .gold-gradient {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 45%, #B38728 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

       .premium-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(239, 192, 123, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

       .btn-gold {
            background: linear-gradient(135deg, #efc07b 0%, #e2a856 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

       .btn-gold:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(239, 192, 123, 0.3);
        }

       .seat {
            aspect-ratio: 1;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: 0.2s;
        }
       .seat.available { background: rgba(255,255,255,0.05); }
       .seat.selected { background: var(--gold); color: black; font-weight: bold; }
       .seat.occupied { background: #1a1a1a; cursor: not-allowed; opacity: 0.2; }

       .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--navy-deep);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

       .step-active { color: var(--gold); border-bottom: 2px solid var(--gold); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const = useState(1);
            const [loading, setLoading] = useState(true);
            const = useState(false);
            const = useState(null);
            
            // Initializing system
            useEffect(() => {
                const timer = setTimeout(() => setLoading(false), 2000);
                return () => clearTimeout(timer);
            },);

            const FlightCard = ({ time, price, code }) => (
                <div onClick={() => setStep(3)} className="premium-glass p-8 rounded-[2rem] flex flex-wrap justify-between items-center group hover:bg-white/5 cursor-pointer transition-all border-l-4 border-transparent hover:border-[#efc07b]">
                    <div className="flex items-center gap-12">
                        <div className="text-center">
                            <p className="text-4xl font-black">10:45</p>
                            <p className="text-[10px] uppercase opacity-40">AMD • Ahmedabad</p>
                        </div>
                        <div className="flex flex-col items-center">
                            <div className="w-40 h-[1px] bg-white/20 relative">
                                <i className="fa-solid fa-plane absolute -top-1.5 left-1/2 -translate-x-1/2 text-xs text-[#efc07b]"></i>
                            </div>
                            <span className="text-[9px] opacity-40 mt-2 tracking-widest">NON-STOP • 9H 20M</span>
                        </div>
                        <div className="text-center">
                            <p className="text-4xl font-black">16:05</p>
                            <p className="text-[10px] uppercase opacity-40">LHR • London</p>
                        </div>
                    </div>
                    <div className="text-right">
                        <p className="text-xs opacity-50 mb-1">J-LUXURY CLASS</p>
                        <p className="text-4xl font-black gold-gradient">₹{price}</p>
                        <p className="text-[10px] text-green-500 font-bold mt-2 tracking-tighter">8 SEATS REMAINING</p>
                    </div>
                </div>
            );

            if (loading) {
                return (
                    <div className="loading-screen">
                        <div className="w-24 h-24 border-b-2 border-[#efc07b] rounded-full animate-spin"></div>
                        <h1 className="mt-10 font-luxury text-3xl gold-gradient tracking-[0.6em] animate-pulse">JAYADITYA</h1>
                        <p className="mt-4 text-[10px] uppercase tracking-[0.4em] opacity-30">Synchronizing Global Fleet...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    {/* Header - Emirates Style */}
                    <nav className="fixed top-0 w-full z-50 px-12 py-8 flex justify-between items-center premium-glass">
                        <div className="text-4xl font-luxury gold-gradient tracking-tighter cursor-pointer">JAYADITYA</div>
                        <div className="hidden lg:flex gap-10 text-[10px] font-black uppercase tracking-[0.3em] items-center">
                            <span className={step === 1? "step-active pb-2" : "opacity-40"}>01 Search</span>
                            <span className={step === 2? "step-active pb-2" : "opacity-40"}>02 Selection</span>
                            <span className={step === 3? "step-active pb-2" : "opacity-40"}>03 Seat Matrix</span>
                        </div>
                        <div className="flex gap-6 items-center">
                            <i className="fa-solid fa-fingerprint text-[#efc07b] text-2xl cursor-pointer" title="Elite Biometrics"></i>
                            <button className="btn-gold px-8 py-3 rounded-full text-[10px]">Elite Login</button>
                        </div>
                    </nav>

                    <main className="pt-48 px-6 max-w-7xl mx-auto">
                        
                        {/* Step 1: Search (IndiGo Speed) */}
                        {step === 1 && (
                            <div className="animate-fadeIn space-y-16">
                                <section className="text-center">
                                    <h2 className="text-7xl md:text-9xl font-luxury leading-none">THE APEX OF<br/><span className="gold-gradient">TRAVEL</span></h2>
                                    <p className="text-gray-500 mt-6 tracking-widest uppercase text-xs">Engineered for those who demand perfection.</p>
                                </section>

                                <div className="premium-glass p-12 rounded-[4rem] max-w-5xl mx-auto">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mb-10">
                                        <div className="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 group focus-within:border-[#efc07b] transition">
                                            <label className="text-[9px] font-black text-[#efc07b] uppercase mb-3 block tracking-widest">Origin Base</label>
                                            <input className="bg-transparent text-3xl font-light w-full outline-none italic placeholder:opacity-20" placeholder="e.g. Ahmedabad (AMD)" defaultValue="Ahmedabad (AMD)" />
                                        </div>
                                        <div className="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 group focus-within:border-[#efc07b] transition">
                                            <label className="text-[9px] font-black text-[#efc07b] uppercase mb-3 block tracking-widest">Destination Port</label>
                                            <input className="bg-transparent text-3xl font-light w-full outline-none italic placeholder:opacity-20" placeholder="e.g. London (LHR)" defaultValue="London (LHR)" />
                                        </div>
                                    </div>
                                    <button onClick={() => setStep(2)} className="btn-gold w-full py-8 rounded-[2.5rem] text-xl font-black">Explore Fleet Availability</button>
                                </div>
                            </div>
                        )}

                        {/* Step 2: Results (Qatar Luxury) */}
                        {step === 2 && (
                            <div className="animate-fadeIn space-y-8 max-w-5xl mx-auto">
                                <div className="flex justify-between items-end mb-12">
                                    <h3 className="text-4xl font-luxury">Available <span className="gold-gradient">Voyages</span></h3>
                                    <button onClick={() => setStep(1)} className="text-[#efc07b] text-xs font-black uppercase tracking-widest"><i className="fa-solid fa-chevron-left mr-2"></i> Back to Search</button>
                                </div>
                                <FlightCard price="1,24,000" />
                                <FlightCard price="1,45,500" />
                                <FlightCard price="2,10,000" />
                            </div>
                        )}

                        {/* Step 3: Seat Map (3D Visualization Logic) */}
                        {step === 3 && (
                            <div className="animate-fadeIn grid grid-cols-1 lg:grid-cols-12 gap-12">
                                <div className="lg:col-span-8 premium-glass p-12 rounded-[4rem]">
                                    <div className="flex justify-between items-center mb-12">
                                        <h3 className="text-3xl font-luxury">Cabin <span className="gold-gradient">Matrix</span></h3>
                                        <div className="flex gap-6 text-[9px] font-black uppercase">
                                            <span className="flex items-center gap-2"><div className="w-3 h-3 bg-white/10 rounded"></div> Open</span>
                                            <span className="flex items-center gap-2"><div className="w-3 h-3 bg-[#efc07b] rounded"></div> Selected</span>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-6 gap-5 max-w-md mx-auto p-12 border-x-4 border-white/5 rounded-[5rem] bg-black/20">
                                        {[...Array(42)].map((_, i) => {
                                            const isOccupied = i % 9 === 0 |

| i % 11 === 0;
                                            return (
                                                <div 
                                                    key={i} 
                                                    className={`seat ${isOccupied? 'occupied' : 'available'} ${selectedSeat === i? 'selected' : ''}`}
                                                    onClick={() =>!isOccupied && setSelectedSeat(i)}
                                                >
                                                    {i + 1}{String.fromCharCode(65 + (i % 6))}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="lg:col-span-4 space-y-8">
                                    <div className="premium-glass p-10 rounded-[3rem] border-t-4 border-[#efc07b]">
                                        <p className="text-[10px] font-black text-[#efc07b] mb-6 tracking-widest uppercase">Voyage Summary</p>
                                        <div className="space-y-5">
                                            <div className="flex justify-between text-sm"><span className="opacity-40">Route</span><span className="font-bold">AMD ➔ LHR</span></div>
                                            <div className="flex justify-between text-sm"><span className="opacity-40">Selected Seat</span><span className="font-bold text-[#efc07b]">{selectedSeat!== null? `${selectedSeat+1}${String.fromCharCode(65+(selectedSeat%6))}` : 'None'}</span></div>
                                            <div className="pt-6 border-t border-white/5 flex justify-between items-center">
                                                <span className="text-xs opacity-40 uppercase font-black">Total Fare</span>
                                                <span className="text-4xl font-black gold-gradient">₹1,24,000</span>
                                            </div>
                                        </div>
                                        <button className="btn-gold w-full py-5 rounded-2xl mt-10">Proceed to Payment</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Jay Assistant (AI Chat) */}
                    <div className="fixed bottom-12 right-12 z-50">
                        {showChat && (
                            <div className="premium-glass w-[380px] h-[500px] mb-6 rounded-[3rem] overflow-hidden flex flex-col shadow-2xl animate-fadeIn border border-[#efc07b]/20">
                                <div className="bg-gradient-to-r from- to- p-6 text-black flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-black rounded-full flex items-center justify-center text-white"><i className="fa-solid fa-robot"></i></div>
                                        <div>
                                            <p className="font-black text-xs uppercase tracking-widest">Jay Assistant</p>
                                            <p className="text-[8px] font-bold opacity-60">Elite Concierge Service</p>
                                        </div>
                                    </div>
                                    <i className="fa-solid fa-xmark cursor-pointer text-xl" onClick={() => setShowChat(false)}></i>
                                </div>
                                <div className="flex-1 p-6 overflow-y-auto space-y-6">
                                    <div className="bg-white/5 p-5 rounded-3xl rounded-tl-none text-[11px] leading-relaxed border border-white/5">
                                        Welcome to the JAYADITYA experience. I am your AI Concierge. How can I perfect your journey today?
                                    </div>
                                    <div className="bg-[#efc07b]/10 p-5 rounded-3xl rounded-tr-none text-[11px] ml-auto w-[85%] border border-[#efc07b]/20">
                                        I need a window seat with extra legroom for my flight to London.
                                    </div>
                                </div>
                                <div className="p-6 border-t border-white/5 flex gap-3">
                                    <input className="flex-1 bg-white/5 rounded-full px-6 py-3 text-xs outline-none border border-white/5 focus:border-[#efc07b]" placeholder="Ask Jay anything..." />
                                    <button className="w-12 h-12 btn-gold rounded-full flex items-center justify-center"><i className="fa-solid fa-paper-plane text-xs"></i></button>
                                </div>
                            </div>
                        )}
                        <div onClick={() => setShowChat(!showChat)} className="w-20 h-20 btn-gold rounded-full flex items-center justify-center shadow-[0_0_40px_rgba(239,192,123,0.4)] cursor-pointer hover:rotate-12 transition-all">
                            <i className="fa-solid fa-comment-dots text-3xl"></i>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
